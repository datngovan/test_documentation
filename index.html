<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APEI Docs — Align Plan Execute Improve</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sidebar-w: 260px;
      --topbar-h: 56px;
      /* ── Primary palette ── */
      --midnight-green: #004851;
      --gold:           #F2C75C;
      --dark-gunmetal:  #1D1F2A;
      --white:          #FFFFFF;
      /* ── Accent priority: Gold > Ruby Red > Green > Dark Purple ── */
      --accent-1: #F2C75C;   /* Gold */
      --accent-2: #9B2335;   /* Ruby Red */
      --accent-3: #1B6B3A;   /* Green */
      --accent-4: #4A1942;   /* Dark Purple */
      /* ── Section colors (accent priority order) ── */
      --color-align:   #F2C75C;  /* Gold */
      --color-plan:    #1B6B3A;  /* Green */
      --color-execute: #9B2335;  /* Ruby Red */
      --color-improve: #4A1942;  /* Dark Purple */
      /* ── UI tokens ── */
      --sidebar-bg:    #004851;
      --sidebar-text:  #a8c4c8;
      --sidebar-hover: #005a66;
      --content-bg:    #FFFFFF;
      --border-color:  #e2e8f0;
      --text-primary:  #1D1F2A;
      --text-secondary:#4a5568;
      /* ── Typography ── */
      --font-en: 'Tenorite', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      --font-vi: 'Work Sans', 'Tenorite', Arial, sans-serif;
      --font-base-size: 14.67px; /* 11pt */
      --font-h1: calc(14.67px * 6);   /* 6x  = 88px  */
      --font-h2: calc(14.67px * 3);   /* 3x  = 44px  */
      --font-h3: calc(14.67px * 1.6); /* 1.6x = 23.5px */
      --font-body: 14.67px;           /* 1x  = 11pt  */
    }

    body {
      font-family: var(--font-en);
      font-size: var(--font-base-size);
      color: var(--text-primary);
      background: var(--content-bg);
      line-height: 1.6;
    }

    /* ── Sidebar ── */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: var(--sidebar-w);
      height: 100vh;
      background: var(--sidebar-bg);
      color: var(--sidebar-text);
      overflow-y: auto;
      z-index: 100;
      transition: transform 0.3s ease;
    }

    .sidebar-header {
      padding: 20px 24px;
      border-bottom: 1px solid #1e293b;
    }

    .sidebar-header h1 {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .sidebar-header p {
      font-size: 11px;
      color: #64748b;
      margin-top: 2px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .nav-section {
      padding: 16px 0 4px;
    }

    .nav-section-title {
      padding: 0 24px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .nav-item {
      display: block;
      padding: 7px 24px 7px 36px;
      font-size: 13px;
      color: var(--sidebar-text);
      text-decoration: none;
      border-left: 3px solid transparent;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .nav-item:hover {
      background: var(--sidebar-hover);
      color: #cbd5e1;
    }

    /* ── Folder tree ── */
    .nav-folder-header {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 16px;
      font-size: 11px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      cursor: pointer;
      user-select: none;
      transition: color 0.15s, background 0.15s;
    }
    .nav-folder-header:hover { color: #94a3b8; background: rgba(255,255,255,0.04); }
    .nav-folder-arrow { font-size: 9px; display: inline-block; transition: transform 0.2s; flex-shrink: 0; line-height: 1; }
    .nav-folder-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .nav-folder:not(.open) > .nav-folder-children { display: none; }
    .nav-folder:not(.open) > .nav-folder-header .nav-folder-arrow { transform: rotate(-90deg); }

    .nav-item.active {
      color: #fff;
      background: var(--sidebar-hover);
    }

    /* ── Main layout ── */
    .main {
      margin-left: var(--sidebar-w);
      min-height: 100vh;
    }

    /* ── Top bar ── */
    .topbar {
      position: sticky;
      top: 0;
      height: var(--topbar-h);
      background: #fff;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      padding: 0 32px;
      gap: 16px;
      z-index: 90;
    }

    .hamburger {
      display: none;
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      color: var(--text-primary);
      padding: 4px;
    }

    .search-wrapper {
      position: relative;
      flex: 1;
      max-width: 560px;
    }

    .search-input {
      width: 100%;
      padding: 8px 12px 8px 36px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: #f8fafc;
    }

    .search-input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(242,199,92,0.18);
      background: #fff;
    }

    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      color: #94a3b8;
      pointer-events: none;
    }

    /* ── Search dropdown ── */
    .search-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: #fff;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.12);
      max-height: 480px;
      overflow-y: auto;
      z-index: 200;
    }

    .search-dropdown.open { display: block; }

    .search-meta {
      padding: 10px 16px 4px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .filter-chips {
      display: flex;
      gap: 6px;
      padding: 8px 16px;
      border-bottom: 1px solid var(--border-color);
      flex-wrap: wrap;
    }

    .filter-chip {
      padding: 3px 10px;
      font-size: 12px;
      border-radius: 99px;
      border: 1px solid var(--border-color);
      background: #fff;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      font-weight: 500;
    }

    .filter-chip:hover { background: #f1f5f9; }
    .filter-chip.active { color: #fff; border-color: transparent; }

    .search-result {
      padding: 10px 16px;
      cursor: pointer;
      border-bottom: 1px solid #f1f5f9;
      transition: background 0.1s;
    }

    .search-result:last-child { border-bottom: none; }
    .search-result:hover, .search-result.highlighted { background: #eff6ff; }

    .search-result-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .section-badge {
      display: inline-block;
      padding: 1px 8px;
      font-size: 11px;
      font-weight: 600;
      border-radius: 99px;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .search-result-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .search-result-excerpt {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .search-result-excerpt mark {
      background: #fef08a;
      color: inherit;
      padding: 0;
      border-radius: 2px;
    }

    .search-no-results {
      padding: 24px 16px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 14px;
    }

    /* ── Content area ── */
    .content {
      max-width: 800px;
      margin: 0 auto;
      padding: 24px 32px 64px;
    }

    .breadcrumb {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .breadcrumb a {
      text-decoration: none;
      color: var(--text-secondary);
    }

    .breadcrumb a:hover { text-decoration: underline; }
    .breadcrumb .sep { margin: 0 6px; color: #cbd5e1; }

    /* ── Markdown rendered styles — typography: 6x/3x/1.6x/1x at 11pt base ── */
    .doc-content h1 { font-size: var(--font-h1); font-weight: 700; margin: 0 0 20px; line-height: 1.1; letter-spacing: -1px; }
    .doc-content h2 { font-size: var(--font-h2); font-weight: 700; margin: 48px 0 14px; padding-bottom: 10px; border-bottom: 2px solid var(--gold); line-height: 1.15; }
    .doc-content h3 { font-size: var(--font-h3); font-weight: 600; margin: 32px 0 10px; }
    .doc-content h4 { font-size: calc(var(--font-body) * 1.15); font-weight: 600; margin: 20px 0 8px; }

    .doc-content p { margin: 0 0 16px; }

    .doc-content ul, .doc-content ol { margin: 0 0 16px; padding-left: 24px; }
    .doc-content li { margin-bottom: 4px; }
    .doc-content li input[type="checkbox"] { margin-right: 6px; }

    .doc-content a { color: var(--doc-section-color, #3b82f6); text-decoration: none; }
    .doc-content a:hover { text-decoration: underline; }

    .doc-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 0 0 16px;
      font-size: 14px;
    }

    .doc-content th, .doc-content td {
      border: 1px solid var(--border-color);
      padding: 8px 12px;
      text-align: left;
    }

    .doc-content th {
      background: var(--gold);
      color: var(--dark-gunmetal);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      font-size: calc(var(--font-body) * 0.85);
    }

    .doc-content tr:nth-child(even) td { background: #fafbfc; }

    .doc-content blockquote {
      border-left: 4px solid var(--doc-section-color, #3b82f6);
      margin: 0 0 16px;
      padding: 12px 16px;
      background: #f8fafc;
      color: var(--text-secondary);
      border-radius: 0 6px 6px 0;
    }

    .doc-content blockquote p:last-child { margin-bottom: 0; }

    .doc-content pre {
      background: #1e293b;
      border-radius: 8px;
      padding: 16px;
      overflow-x: auto;
      margin: 0 0 16px;
    }

    .doc-content pre code {
      color: #e2e8f0;
      font-size: 13px;
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      background: transparent;
      padding: 0;
    }

    .doc-content code {
      background: #f1f5f9;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    }

    .doc-content strong { font-weight: 600; }

    .doc-content hr {
      border: none;
      border-top: 1px solid var(--border-color);
      margin: 32px 0;
    }

    /* ── Mobile ── */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 99;
    }

    @media (max-width: 767px) {
      .sidebar {
        transform: translateX(-100%);
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .sidebar-overlay.open {
        display: block;
      }

      .main {
        margin-left: 0;
      }

      .hamburger {
        display: block;
      }

      .content {
        padding: 16px;
      }

      .topbar {
        padding: 0 16px;
      }
    }

    /* ── Restricted lock screen ── */
    .restricted-screen {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 420px; text-align: center; padding: 48px 24px;
    }
    .restricted-icon { font-size: 72px; margin-bottom: 16px; line-height: 1; }
    .restricted-screen h2 { font-size: 26px; font-weight: 700; color: #1e293b; margin-bottom: 8px; }
    .restricted-doc-title {
      font-size: 15px; font-weight: 600; color: #64748b; margin-bottom: 16px;
      padding: 4px 14px; background: #f1f5f9; border-radius: 6px; display: inline-block;
    }
    .restricted-screen > p { font-size: 14px; color: #64748b; max-width: 400px; margin-bottom: 8px; line-height: 1.6; }
    .restricted-actions { display: flex; gap: 12px; margin-top: 24px; flex-wrap: wrap; justify-content: center; }
    .restricted-actions button, .restricted-actions a {
      padding: 9px 20px; border-radius: 8px; font-size: 14px; font-weight: 500;
      cursor: pointer; text-decoration: none; transition: opacity 0.15s; border: none;
    }
    .restricted-actions button { background: #f1f5f9; color: #475569; }
    .restricted-actions a { background: #ef4444; color: #fff; }
    .restricted-actions button:hover, .restricted-actions a:hover { opacity: 0.85; }
    .nav-item .lock-icon { font-size: 11px; margin-left: 5px; opacity: 0.65; }
    .restricted-badge {
      display: inline-block; padding: 1px 7px; font-size: 10px; font-weight: 600;
      border-radius: 99px; background: #fef2f2; color: #dc2626; border: 1px solid #fecaca;
      text-transform: uppercase; letter-spacing: 0.3px; margin-left: 4px;
    }
    .search-result.restricted-result .search-result-excerpt { color: #dc2626; font-style: italic; }

    /* ── Language toggle ── */
    .lang-toggle {
      display: flex;
      align-items: center;
      gap: 2px;
      background: #f1f5f9;
      border-radius: 8px;
      padding: 3px;
      flex-shrink: 0;
    }

    .lang-btn {
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: transparent;
      color: #64748b;
      letter-spacing: 0.4px;
      transition: background 0.15s, color 0.15s;
    }

    .lang-btn:hover { color: var(--dark-gunmetal); }

    .lang-btn.active {
      background: var(--midnight-green);
      color: #fff;
    }

    /* ── VI font override ── */
    body.lang-vi { font-family: var(--font-vi); }

    /* ── Scrollbar ── */
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }

    .search-dropdown::-webkit-scrollbar { width: 6px; }
    .search-dropdown::-webkit-scrollbar-track { background: transparent; }
    .search-dropdown::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
  </style>
</head>
<body>

  <!-- Sidebar overlay for mobile -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1>APEI Docs</h1>
      <p>Align &middot; Plan &middot; Execute &middot; Improve</p>
    </div>
    <nav id="sidebarNav"></nav>
  </aside>

  <!-- Main area -->
  <div class="main">
    <!-- Top bar -->
    <header class="topbar">
      <button class="hamburger" id="hamburgerBtn" aria-label="Toggle navigation">&#9776;</button>
      <div class="search-wrapper">
        <span class="search-icon">&#128269;</span>
        <input type="text" class="search-input" id="searchInput" placeholder="Search documentation..." autocomplete="off" aria-label="Search documentation">
        <div class="search-dropdown" id="searchDropdown" role="listbox">
          <div class="filter-chips" id="filterChips"></div>
          <div id="searchResults"></div>
        </div>
      </div>
      <div class="lang-toggle" id="langToggle" aria-label="Language">
        <button class="lang-btn active" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="vi">VI</button>
      </div>
    </header>

    <!-- Content -->
    <article class="content">
      <div class="breadcrumb" id="breadcrumb"></div>
      <div class="doc-content" id="docContent"></div>
    </article>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lunr@2.3.9/lunr.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/highlight.min.js"></script>
  <script>
    (function () {
      'use strict';

      // ── State ──
      let documents = [];
      let lunrIndex = null;
      let activeDocId = null;
      let activeFilter = 'all';
      let activeLang = 'en';
      let highlightedResultIdx = -1;
      let currentResults = [];
      let debounceTimer = null;

      // ── i18n strings ──
      const i18n = {
        en: {
          searchPlaceholder: 'Search documentation...',
          home: 'Home',
          restricted: 'Restricted Document',
          restrictedMsg: 'This document is classified and requires elevated access permissions to view.',
          restrictedContact: 'Contact your team lead or security administrator to request access.',
          goBack: '\u2190 Go Back',
          requestAccess: 'Request Access',
          noResults: 'No results found for',
          filterAll: 'All'
        },
        vi: {
          searchPlaceholder: 'T\u00ecm ki\u1ebfm t\u00e0i li\u1ec7u...',
          home: 'Trang ch\u1ee7',
          restricted: 'T\u00e0i li\u1ec7u b\u1ecb h\u1ea1n ch\u1ebf',
          restrictedMsg: 'T\u00e0i li\u1ec7u n\u00e0y \u0111\u01b0\u1ee3c ph\u00e2n lo\u1ea1i v\u00e0 y\u00eau c\u1ea7u quy\u1ec1n truy c\u1eadp n\u00e2ng cao \u0111\u1ec3 xem.',
          restrictedContact: 'Li\u00ean h\u1ec7 tr\u01b0\u1edfng nh\u00f3m ho\u1eb7c qu\u1ea3n tr\u1ecb vi\u00ean b\u1ea3o m\u1eadt \u0111\u1ec3 y\u00eau c\u1ea7u quy\u1ec1n truy c\u1eadp.',
          goBack: '\u2190 Quay l\u1ea1i',
          requestAccess: 'Y\u00eau c\u1ea7u truy c\u1eadp',
          noResults: 'Kh\u00f4ng t\u00ecm th\u1ea5y k\u1ebft qu\u1ea3 cho',
          filterAll: 'T\u1ea5t c\u1ea3'
        }
      };

      function t(key) { return i18n[activeLang][key] || i18n.en[key]; }

      // ── DOM refs ──
      const sidebar = document.getElementById('sidebar');
      const sidebarOverlay = document.getElementById('sidebarOverlay');
      const sidebarNav = document.getElementById('sidebarNav');
      const hamburgerBtn = document.getElementById('hamburgerBtn');
      const searchInput = document.getElementById('searchInput');
      const searchDropdown = document.getElementById('searchDropdown');
      const filterChipsEl = document.getElementById('filterChips');
      const searchResultsEl = document.getElementById('searchResults');
      const breadcrumb = document.getElementById('breadcrumb');
      const docContent = document.getElementById('docContent');
      const langToggle = document.getElementById('langToggle');

      // ── Section colors map (brand palette) ──
      const sectionColors = {
        align: '#F2C75C',
        plan: '#1B6B3A',
        execute: '#9B2335',
        improve: '#4A1942'
      };

      // ── Filtered docs helper ──
      function filteredDocs() {
        return documents.filter(function (d) { return d.lang === activeLang; });
      }

      // ── Init ──
      fetch('search-index.json')
        .then(function (r) { return r.json(); })
        .then(function (data) {
          documents = data.documents;
          buildNav();
          buildLunrIndex();
          buildFilterChips();
          handleRoute();
        })
        .catch(function (err) {
          docContent.innerHTML = '<h1>Error Loading Documentation</h1><p>Could not load search-index.json. Make sure the file exists.</p>';
          console.error(err);
        });

      // ── Build sidebar nav (tree) ──
      function buildNav() {
        var sections = {};
        filteredDocs().forEach(function (doc) {
          if (!sections[doc.section]) {
            sections[doc.section] = { label: doc.sectionLabel, color: doc.sectionColor, tree: { children: {}, docs: [] } };
          }
          var node = sections[doc.section].tree;
          var crumbs = doc.breadcrumb || [];
          crumbs.forEach(function (crumb) {
            if (!node.children[crumb]) node.children[crumb] = { children: {}, docs: [] };
            node = node.children[crumb];
          });
          node.docs.push(doc);
        });

        var html = '';
        Object.keys(sections).forEach(function (key) {
          var sec = sections[key];
          html += '<div class="nav-section">';
          html += '<div class="nav-section-title" style="color:' + sec.color + '">' + sec.label + '</div>';
          html += renderNavTree(sec.tree, 0);
          html += '</div>';
        });
        sidebarNav.innerHTML = html;

        sidebarNav.querySelectorAll('.nav-folder-header').forEach(function (el) {
          el.addEventListener('click', function () {
            this.closest('.nav-folder').classList.toggle('open');
          });
        });
        sidebarNav.querySelectorAll('.nav-item').forEach(function (el) {
          el.addEventListener('click', function () { closeMobileSidebar(); });
        });
      }

      function renderNavTree(node, depth) {
        var html = '';
        var docIndent = (36 + depth * 12) + 'px';
        var folderIndent = (20 + depth * 12) + 'px';

        node.docs.forEach(function (doc) {
          var lock = doc.restricted ? '<span class="lock-icon">&#128274;</span>' : '';
          html += '<a class="nav-item" style="padding-left:' + docIndent + '" data-id="' + doc.id + '" href="#' + doc.id + '">' + doc.title + lock + '</a>';
        });

        Object.keys(node.children).forEach(function (name) {
          var child = node.children[name];
          html += '<div class="nav-folder open">';
          html += '<div class="nav-folder-header" style="padding-left:' + folderIndent + '">' +
            '<span class="nav-folder-arrow">&#9660;</span>' +
            '<span class="nav-folder-name">' + name + '</span></div>';
          html += '<div class="nav-folder-children">' + renderNavTree(child, depth + 1) + '</div>';
          html += '</div>';
        });
        return html;
      }

      // ── Build lunr index ──
      function buildLunrIndex() {
        lunrIndex = lunr(function () {
          this.ref('id');
          this.field('title', { boost: 10 });
          this.field('tags', { boost: 5 });
          this.field('content', { boost: 1 });

          filteredDocs().forEach(function (doc) {
            this.add({
              id: doc.id,
              title: doc.title,
              tags: doc.tags.join(' '),
              content: doc.content
            });
          }, this);
        });
      }

      // ── Filter chips ──
      function buildFilterChips() {
        var sections = [
          { key: 'all', label: t('filterAll'), color: '#475569' },
          { key: 'align', label: 'Align', color: sectionColors.align },
          { key: 'plan', label: 'Plan', color: sectionColors.plan },
          { key: 'execute', label: 'Execute', color: sectionColors.execute },
          { key: 'improve', label: 'Improve', color: sectionColors.improve }
        ];

        filterChipsEl.innerHTML = sections.map(function (s) {
          return '<button class="filter-chip' + (s.key === activeFilter ? ' active' : '') + '" data-filter="' + s.key + '" style="' +
            (s.key === activeFilter ? 'background:' + s.color + ';color:#fff;border-color:transparent' : '') + '">' + s.label + '</button>';
        }).join('');

        filterChipsEl.querySelectorAll('.filter-chip').forEach(function (chip) {
          chip.addEventListener('click', function () {
            activeFilter = this.getAttribute('data-filter');
            updateFilterChipStyles();
            performSearch(searchInput.value.trim());
          });
        });
      }

      function updateFilterChipStyles() {
        filterChipsEl.querySelectorAll('.filter-chip').forEach(function (chip) {
          var key = chip.getAttribute('data-filter');
          var isActive = key === activeFilter;
          var color = key === 'all' ? '#475569' : sectionColors[key];
          chip.className = 'filter-chip' + (isActive ? ' active' : '');
          chip.style.background = isActive ? color : '';
          chip.style.color = isActive ? '#fff' : '';
          chip.style.borderColor = isActive ? 'transparent' : '';
        });
      }

      // ── Hash routing ──
      window.addEventListener('hashchange', handleRoute);

      function handleRoute() {
        var hash = window.location.hash.slice(1) || 'align-overview';
        loadDoc(hash);
      }

      function loadDoc(id) {
        var langDocs = filteredDocs();
        var doc = langDocs.find(function (d) { return d.id === id; });
        if (!doc) {
          doc = langDocs[0];
          id = doc ? doc.id : (documents[0] && documents[0].id);
          if (!doc) return;
        }

        activeDocId = id;

        // Set section color as CSS custom property
        docContent.style.setProperty('--doc-section-color', doc.sectionColor);

        // Breadcrumb
        var overviewId = doc.section + (activeLang === 'vi' ? '-overview-vi' : '-overview');
        var homeId = activeLang === 'vi' ? 'align-overview-vi' : 'align-overview';
        breadcrumb.innerHTML = '<a href="#' + homeId + '">' + t('home') + '</a><span class="sep">&rsaquo;</span>' +
          '<a href="#' + overviewId + '" style="color:' + doc.sectionColor + '">' + doc.sectionLabel + '</a>' +
          '<span class="sep">&rsaquo;</span>' + doc.title;

        // Restricted doc — show lock screen
        if (doc.restricted) {
          docContent.innerHTML =
            '<div class="restricted-screen">' +
            '<div class="restricted-icon">🔒</div>' +
            '<h2>' + t('restricted') + '</h2>' +
            '<p class="restricted-doc-title">' + escapeHtml(doc.title) + '</p>' +
            '<p>' + t('restrictedMsg') + '</p>' +
            '<p>' + t('restrictedContact') + '</p>' +
            '<div class="restricted-actions">' +
            '<button onclick="history.back()">' + t('goBack') + '</button>' +
            '<a href="mailto:admin@company.com">' + t('requestAccess') + '</a>' +
            '</div></div>';
          sidebarNav.querySelectorAll('.nav-item').forEach(function (el) {
            var isActive = el.getAttribute('data-id') === id;
            el.classList.toggle('active', isActive);
            el.style.borderLeftColor = isActive ? doc.sectionColor : 'transparent';
            if (isActive) {
              var p = el.parentElement;
              while (p && p !== sidebarNav) {
                if (p.classList.contains('nav-folder')) p.classList.add('open');
                p = p.parentElement;
              }
            }
          });
          window.scrollTo(0, 0);
          return;
        }

        // Render markdown
        var html = marked.parse(doc.content);
        docContent.innerHTML = html;

        // Syntax highlighting
        docContent.querySelectorAll('pre code').forEach(function (el) {
          hljs.highlightElement(el);
        });

        // Update active nav + open ancestor folders
        sidebarNav.querySelectorAll('.nav-item').forEach(function (el) {
          var isActive = el.getAttribute('data-id') === id;
          el.classList.toggle('active', isActive);
          el.style.borderLeftColor = isActive ? doc.sectionColor : 'transparent';
          if (isActive) {
            var p = el.parentElement;
            while (p && p !== sidebarNav) {
              if (p.classList.contains('nav-folder')) p.classList.add('open');
              p = p.parentElement;
            }
          }
        });

        // Scroll to top
        window.scrollTo(0, 0);
      }

      // ── Search ──
      searchInput.addEventListener('input', function () {
        var term = this.value.trim();
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(function () {
          performSearch(term);
        }, 150);
      });

      searchInput.addEventListener('focus', function () {
        if (this.value.trim().length > 0) {
          performSearch(this.value.trim());
        }
      });

      function performSearch(term) {
        highlightedResultIdx = -1;

        if (!term || term.length < 1) {
          closeSearch();
          return;
        }

        var results;
        try {
          // Boosted title match + wildcard
          var query = 'title:' + term + '* ' + term + '*';
          results = lunrIndex.search(query);
        } catch (e) {
          // Fallback: simple wildcard
          try {
            results = lunrIndex.search(term + '*');
          } catch (e2) {
            results = [];
          }
        }

        // Map to docs (active language only)
        currentResults = results.map(function (r) {
          return documents.find(function (d) { return d.id === r.ref && d.lang === activeLang; });
        }).filter(Boolean);

        // Filter by section
        if (activeFilter !== 'all') {
          currentResults = currentResults.filter(function (d) { return d.section === activeFilter; });
        }

        // Limit to 10
        currentResults = currentResults.slice(0, 10);

        renderResults(term, currentResults);
      }

      function renderResults(term, results) {
        searchDropdown.classList.add('open');

        if (results.length === 0) {
          searchResultsEl.innerHTML = '<div class="search-no-results">' + t('noResults') + ' &ldquo;' + escapeHtml(term) + '&rdquo;</div>';
          return;
        }

        var terms = term.toLowerCase().split(/\s+/).filter(Boolean);

        var html = '<div class="search-meta">' + results.length + ' result' + (results.length !== 1 ? 's' : '') + ' for &ldquo;' + escapeHtml(term) + '&rdquo;</div>';

        results.forEach(function (doc, idx) {
          var highlightedTitle = highlightTerms(doc.title, terms);
          var restrictedClass = doc.restricted ? ' restricted-result' : '';
          var restrictedBadge = doc.restricted ? '<span class="restricted-badge">Restricted</span>' : '';
          var excerptHtml;
          if (doc.restricted) {
            excerptHtml = '🔒 Access restricted — contact your administrator to view this document.';
          } else {
            excerptHtml = highlightTerms(getExcerpt(doc.content, terms, 150), terms);
          }

          html += '<div class="search-result' + restrictedClass + '" data-idx="' + idx + '" data-id="' + doc.id + '" role="option">' +
            '<div class="search-result-header">' +
            '<span class="section-badge" style="background:' + doc.sectionColor + '">' + doc.sectionLabel + '</span>' +
            '<span class="search-result-title">' + highlightedTitle + '</span>' +
            restrictedBadge +
            '</div>' +
            '<div class="search-result-excerpt">' + excerptHtml + '</div>' +
            '</div>';
        });

        searchResultsEl.innerHTML = html;

        // Click handlers
        searchResultsEl.querySelectorAll('.search-result').forEach(function (el) {
          el.addEventListener('click', function () {
            var id = this.getAttribute('data-id');
            window.location.hash = id;
            closeSearch();
            searchInput.value = '';
          });
        });
      }

      function getExcerpt(content, terms, windowSize) {
        // Strip markdown formatting for cleaner excerpts
        var plain = content
          .replace(/^#{1,6}\s+/gm, '')
          .replace(/\*\*(.*?)\*\*/g, '$1')
          .replace(/\*(.*?)\*/g, '$1')
          .replace(/`{1,3}[^`]*`{1,3}/g, '')
          .replace(/\[([^\]]*)\]\([^)]*\)/g, '$1')
          .replace(/[|>\-]/g, ' ')
          .replace(/\s+/g, ' ')
          .trim();

        var lower = plain.toLowerCase();
        var bestPos = -1;

        for (var i = 0; i < terms.length; i++) {
          var pos = lower.indexOf(terms[i]);
          if (pos !== -1) {
            bestPos = pos;
            break;
          }
        }

        if (bestPos === -1) bestPos = 0;

        var start = Math.max(0, bestPos - Math.floor(windowSize / 3));
        var end = Math.min(plain.length, start + windowSize);

        var excerpt = plain.substring(start, end);
        if (start > 0) excerpt = '...' + excerpt;
        if (end < plain.length) excerpt = excerpt + '...';

        return excerpt;
      }

      function highlightTerms(text, terms) {
        var result = escapeHtml(text);
        terms.forEach(function (t) {
          if (t.length < 1) return;
          var escaped = t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          var re = new RegExp('(' + escaped + ')', 'gi');
          result = result.replace(re, '<mark>$1</mark>');
        });
        return result;
      }

      function escapeHtml(str) {
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(str));
        return div.innerHTML;
      }

      function closeSearch() {
        searchDropdown.classList.remove('open');
        highlightedResultIdx = -1;
      }

      // ── Keyboard nav for search ──
      searchInput.addEventListener('keydown', function (e) {
        if (!searchDropdown.classList.contains('open')) return;

        var items = searchResultsEl.querySelectorAll('.search-result');
        if (items.length === 0) return;

        if (e.key === 'ArrowDown') {
          e.preventDefault();
          highlightedResultIdx = Math.min(highlightedResultIdx + 1, items.length - 1);
          updateHighlight(items);
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          highlightedResultIdx = Math.max(highlightedResultIdx - 1, 0);
          updateHighlight(items);
        } else if (e.key === 'Enter') {
          e.preventDefault();
          if (highlightedResultIdx >= 0 && items[highlightedResultIdx]) {
            items[highlightedResultIdx].click();
          }
        }
      });

      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') {
          closeSearch();
          searchInput.blur();
          closeMobileSidebar();
        }
      });

      function updateHighlight(items) {
        items.forEach(function (el, idx) {
          el.classList.toggle('highlighted', idx === highlightedResultIdx);
        });
        if (items[highlightedResultIdx]) {
          items[highlightedResultIdx].scrollIntoView({ block: 'nearest' });
        }
      }

      // Close search on outside click
      document.addEventListener('click', function (e) {
        if (!searchInput.contains(e.target) && !searchDropdown.contains(e.target)) {
          closeSearch();
        }
      });

      // ── Language switch ──
      function switchLang(lang) {
        if (lang === activeLang) return;

        var prevDocId = activeDocId;
        activeLang = lang;

        // Update body font class
        document.body.classList.toggle('lang-vi', lang === 'vi');

        // Update toggle button styles
        langToggle.querySelectorAll('.lang-btn').forEach(function (btn) {
          btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
        });

        // Update search placeholder
        searchInput.placeholder = t('searchPlaceholder');

        // Rebuild nav, search index, filter chips for new language
        activeFilter = 'all';
        buildNav();
        buildLunrIndex();
        buildFilterChips();

        // Try to find the equivalent doc in the new language
        var equivalentId;
        if (lang === 'vi') {
          equivalentId = prevDocId + '-vi';
        } else {
          equivalentId = prevDocId ? prevDocId.replace(/-vi$/, '') : null;
        }

        var langDocs = filteredDocs();
        var targetDoc = equivalentId && langDocs.find(function (d) { return d.id === equivalentId; });
        if (!targetDoc) targetDoc = langDocs[0];

        if (targetDoc) {
          window.location.hash = targetDoc.id;
        }

        closeSearch();
      }

      langToggle.querySelectorAll('.lang-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
          switchLang(this.getAttribute('data-lang'));
        });
      });

      // ── Mobile sidebar toggle ──
      hamburgerBtn.addEventListener('click', function () {
        sidebar.classList.toggle('open');
        sidebarOverlay.classList.toggle('open');
      });

      sidebarOverlay.addEventListener('click', closeMobileSidebar);

      function closeMobileSidebar() {
        sidebar.classList.remove('open');
        sidebarOverlay.classList.remove('open');
      }

    })();
  </script>
</body>
</html>
